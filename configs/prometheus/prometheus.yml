# ==========================================
# Prometheus конфигурация - Ubuntu Server (192.168.10.10)
# Събира метрики от Linux сървъра и отдалечения Windows сървър
# ==========================================

global:
  scrape_interval: 10s

scrape_configs:
  - job_name: 'ubuntu_server'
    static_configs:
      - targets: ['192.168.10.10:9100']

  - job_name: 'windows_server'
    static_configs:
      - targets: ['192.168.20.10:9182']
